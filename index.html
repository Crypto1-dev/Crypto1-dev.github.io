<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TDY Coin – Web Wallet + Full Node</title>
  <style>
    body { font-family: monospace; background: #111; color: #0ff; padding: 2rem; }
    h1, h2 { color: #f0f; }
    input, textarea { width: 100%; background: #000; color: #0f0; padding: 0.5rem; margin-bottom: 1rem; border: 1px solid #444; }
    button { background: #f0f; color: white; padding: 0.5rem 1rem; border: none; font-weight: bold; cursor: pointer; margin-bottom: 1rem; }
    pre { background: #000; padding: 1rem; overflow-x: auto; color: #0f0; }
  </style>
</head>
<body>
  <h1>🌐 TDY Coin – Decentralized You</h1>

  <div>
    <button onclick="generateWallet()">🔐 Generate Wallet</button>
    <p>Address:</p>
    <textarea id="address" readonly></textarea>
    <p>Private Key:</p>
    <textarea id="private" readonly></textarea>
  </div>

  <div>
    <h2>💸 Send TDY</h2>
    <input id="to" placeholder="To Address">
    <input id="amount" type="number" placeholder="Amount">
    <button onclick="send()">📤 Send</button>
  </div>

  <div>
    <h2>⛏️ Mine Block</h2>
    <button onclick="mine()">⛏️ Start Mining</button>
    <pre id="mineStatus">⛏️ Waiting to mine...</pre>
  </div>

  <div>
    <h2>📦 Blockchain</h2>
    <button onclick="showChain()">📚 Show Chain</button>
    <pre id="chainData"></pre>
  </div>

<script>
  let blockchain = JSON.parse(localStorage.getItem("tdy_chain") || "[]");
  let mempool = JSON.parse(localStorage.getItem("tdy_mempool") || "[]");
  let wallet = JSON.parse(localStorage.getItem("tdy_wallet") || "null") || {};

  function save() {
    localStorage.setItem("tdy_chain", JSON.stringify(blockchain));
    localStorage.setItem("tdy_mempool", JSON.stringify(mempool));
    localStorage.setItem("tdy_wallet", JSON.stringify(wallet));
  }

  async function hash(data) {
    let msg = new TextEncoder().encode(data);
    let buf = await crypto.subtle.digest("SHA-256", msg);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function generateWallet() {
    let key = crypto.getRandomValues(new Uint8Array(32));
    let priv = Array.from(key).map(b => b.toString(16).padStart(2, '0')).join('');
    let pub = await hash(priv);
    wallet = { private: priv, address: "TDY" + pub.slice(0, 32) };
    document.getElementById("address").value = wallet.address;
    document.getElementById("private").value = priv;
    save();
  }

  function send() {
    let to = document.getElementById("to").value;
    let amount = parseFloat(document.getElementById("amount").value);
    if (!to || !amount || !wallet.address) return alert("Missing info!");
    mempool.push({
      from: wallet.address,
      to,
      amount,
      time: Date.now()
    });
    alert("✅ TX added to mempool");
    save();
  }

  function getBalance(addr) {
    let balance = 0;
    for (let block of blockchain) {
      for (let tx of block.transactions) {
        if (tx.to === addr) balance += tx.amount;
        if (tx.from === addr) balance -= tx.amount;
      }
    }
    return balance;
  }

  async function mine() {
    document.getElementById("mineStatus").textContent = "⏳ Mining...";
    let rewardTx = {
      from: "COINBASE",
      to: wallet.address,
      amount: 25,
      time: Date.now()
    };
    let txs = [...mempool, rewardTx];
    let prev = blockchain.length ? blockchain[blockchain.length - 1].hash : "0".repeat(64);
    let nonce = 0;
    let hashVal = "";
    while (true) {
      let block = {
        index: blockchain.length,
        timestamp: Date.now(),
        transactions: txs,
        previousHash: prev,
        nonce
      };
      let str = JSON.stringify(block);
      hashVal = await hash(str);
      if (hashVal.startsWith("0000")) {
        block.hash = hashVal;
        blockchain.push(block);
        mempool = [];
        save();
        document.getElementById("mineStatus").textContent = "✅ Block mined: " + hashVal;
        return;
      }
      nonce++;
      if (nonce % 1000 === 0) document.getElementById("mineStatus").textContent = "⏳ Trying nonce " + nonce;
    }
  }

  function showChain() {
    document.getElementById("chainData").textContent = JSON.stringify(blockchain, null, 2);
  }

  // Load wallet on page load
  if (wallet.address) {
    document.getElementById("address").value = wallet.address;
    document.getElementById("private").value = wallet.private;
  }
</script>
</body>
</html>
