<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>sha-byte</title>
  <style>
    :root {
      --primary-neon: #00f6ff;
      --secondary-neon: #ff00e6;
      --bg-dark: #0a0a1c;
      --card-bg: rgba(255, 255, 255, 0.05);
      --text-light: #e0e7ff;
      --text-code: #a5d6ff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, var(--bg-dark), #1a1a3a);
      color: var(--text-light);
      font-family: 'Orbitron', sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    .container {
      max-width: 900px;
      width: 100%;
      animation: fadeIn 1.5s ease-in-out;
    }

    h1 {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 1rem;
      background: linear-gradient(45deg, var(--primary-neon), var(--secondary-neon));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 10px var(--primary-neon);
    }

    .code-card {
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 2rem;
      margin-top: 2rem;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 246, 255, 0.1);
      position: relative;
      transition: transform 0.3s ease;
    }

    .code-card:hover {
      transform: translateY(-5px);
    }

    .code-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    h2 {
      font-size: 1.5rem;
      color: var(--primary-neon);
      text-shadow: 0 0 5px var(--primary-neon);
      font-family: 'JetBrains Mono', monospace;
    }

    .copy-btn {
      background: var(--primary-neon);
      color: var(--bg-dark);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }

    .copy-btn:hover {
      background: var(--secondary-neon);
      box-shadow: 0 0 15px var(--secondary-neon);
    }

    .copy-btn:active {
      transform: scale(0.95);
    }

    pre {
      background: rgba(0, 0, 0, 0.2);
      padding: 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-code);
      font-size: 0.95rem;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    input[type="text"] {
      width: 100%;
      padding: 0.8rem;
      margin-top: 1rem;
      border-radius: 8px;
      border: 1px solid var(--primary-neon);
      background: #111;
      color: var(--text-light);
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      h2 { font-size: 1.2rem; }
      pre { font-size: 0.85rem; }
      .code-card { padding: 1rem; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1>Here is the sha-byte code:</h1>
    <input type="text" id="inputText" placeholder="Enter text to hash..." oninput="updateHash()" />
    <div class="code-card">
      <div class="code-header">
        <button class="copy-btn" onclick="copyCode()">Copy Code</button>
        <h6 id="hash-title">Hash will appear here</h6>
      </div>
      <pre id="code-block">Waiting for input...</pre>
    </div>
  </div>

  <script>
    async function updateHash() {
      const text = document.getElementById('inputText').value;
      if (!text) {
        document.getElementById('hash-title').textContent = 'Hash will appear here';
        document.getElementById('code-block').textContent = 'Waiting for input...';
        return;
      }

      const msgBuffer = new TextEncoder().encode(text);
      const hashBuffer = await crypto.subtle.digest('SHA-512', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

      document.getElementById('hash-title').textContent = hashHex;
      document.getElementById('code-block').textContent = formatHash(hashHex);
    }

    function formatHash(hex) {
      return hex.match(/.{1,64}/g).join('\n');
    }

    function copyCode() {
      const code = document.getElementById('code-block').textContent;
      navigator.clipboard.writeText(code).then(() => {
        alert("Hash copied to clipboard!");
      });
    }
  </script>
</body>
</html>
