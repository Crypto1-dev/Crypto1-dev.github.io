<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Citi Wallet (CI)</title>
  <style>
    body {
      font-family: monospace;
      background: #0e0e0e;
      color: #00ffcc;
      padding: 20px;
      line-height: 1.5;
    }
    input, button {
      background: #111;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      padding: 8px;
      margin: 5px;
    }
    button:hover {
      background: #222;
      cursor: pointer;
    }
    .section {
      margin-bottom: 20px;
      padding: 10px;
      border: 1px solid #00ffcc;
    }
    #wallet, #sendDiv, #farmDiv {
      display: none;
    }
  </style>
</head>
<body>
  <h1>🪙 Citi Wallet (CI)</h1>
  
  <!-- Login Section -->
  <div id="loginDiv" class="section">
    <h3>Login</h3>
    <input type="text" id="username" placeholder="Username" /><br />
    <input type="password" id="password" placeholder="Password" /><br />
    <button onclick="login()">Login</button>
  </div>
  
  <!-- Main Wallet Section -->
  <div id="wallet" class="section">
    <h3>Wallet</h3>
    <p>Address: <span id="address"></span></p>
    <p>Balance: <span id="balance">0</span> CI</p>
    <div>
      <label for="emailInput">Email (for farming):</label>
      <input type="email" id="emailInput" placeholder="you@example.com" />
      <button onclick="verifyEmail()">Verify Email</button>
    </div>
    <!-- Send Coins Section -->
    <div id="sendDiv" class="section">
      <h4>Send CI</h4>
      <input type="text" id="to" placeholder="Recipient address" /><br />
      <input type="number" id="amount" placeholder="Amount" /><br />
      <button onclick="send()">Send</button>
    </div>
    <!-- Farming Section -->
    <div id="farmDiv" class="section">
      <h4>Farm CI</h4>
      <button onclick="farm()">Farm 1 CI</button>
    </div>
  </div>

  <script>
    // Utility: SHA-256 hash function using Web Crypto API
    async function sha256(str) {
      const buffer = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buffer))
          .map(b => b.toString(16).padStart(2, "0"))
          .join("");
    }

    let address = "", key = "", currentUser = "";
    
    // Login function: Derive key and wallet address
    async function login() {
      currentUser = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value;
      if (!currentUser || !pass) {
        return alert("Please enter both username and password.");
      }
      // Derive a deterministic key from username and password
      key = await sha256(currentUser + ":" + pass);
      // Generate wallet address (hash of key with a prefix)
      address = await sha256("ADDR:" + key);
      document.getElementById("address").innerText = address.slice(0,16) + "...";
      // Hide login, show wallet and additional panels
      document.getElementById("loginDiv").style.display = "none";
      document.getElementById("wallet").style.display = "block";
      document.getElementById("sendDiv").style.display = "block";
      document.getElementById("farmDiv").style.display = "block";
      getBalance();
    }
    
    // Get user balance from the global storage (Sheet.best API)
    async function getBalance() {
      try {
        const res = await fetch("https://sheet.best/api/sheets/b4c6a8da-8b08-43e6-b6b3-testonly");
        const data = await res.json();
        const acct = data.find(a => a.address === address);
        document.getElementById("balance").innerText = acct ? acct.balance : "0";
      } catch (e) {
        console.error("Error fetching balance:", e);
      }
    }
    
    // Send CI: Create a signed transaction and post it
    async function send() {
      const to = document.getElementById("to").value.trim();
      const amount = parseInt(document.getElementById("amount").value);
      if (!to || isNaN(amount) || amount <= 0) {
        return alert("Please enter a valid recipient and amount.");
      }
      // Sign the transaction: using address, recipient, amount and user's key
      const sig = await sha256(address + to + amount + key);
      try {
        const res = await fetch("https://sheet.best/api/sheets/b4c6a8da-8b08-43e6-b6b3-testonly", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            from: address,
            to: to,
            amount: amount,
            sig: sig,
            type: "send",
            timestamp: Date.now()
          })
        });
        if (res.ok) alert("Transaction submitted!");
        else alert("Transaction failed!");
      } catch (e) {
        console.error("Send error:", e);
        alert("Send error, check console.");
      }
    }
    
    // Farm CI: User earns 1 CI per click (requires email verification)
    async function farm() {
      const now = Date.now();
      const sig = await sha256(address + now + key);
      try {
        const res = await fetch("https://sheet.best/api/sheets/b4c6a8da-8b08-43e6-b6b3-testonly", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            address: address,
            amount: 1,
            sig: sig,
            timestamp: now,
            type: "farm"
          })
        });
        if (res.ok) alert("Farming submitted! (1 CI earned)");
        else alert("Farming submission failed!");
      } catch (e) {
        console.error("Farm error:", e);
        alert("Farm error, check console.");
      }
    }
    
    // Email Verification: Used solely for farming rights
    async function verifyEmail() {
      const email = document.getElementById("emailInput").value.trim();
      if (!email || !email.includes("@")) {
        return alert("Please enter a valid email address.");
      }
      const sig = await sha256(address + email + key);
      try {
        const res = await fetch("https://sheet.best/api/sheets/b4c6a8da-8b08-43e6-b6b3-testonly", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            address: address,
            email: email,
            sig: sig,
            type: "verify",
            timestamp: Date.now()
          })
        });
        if (res.ok) alert("Email verification submitted!");
        else alert("Email verification failed!");
      } catch (e) {
        console.error("Email verification error:", e);
        alert("Error submitting email verification.");
      }
    }
  </script>
</body>
</html>
